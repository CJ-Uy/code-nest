name: CI

on:
  pull_request:
  push:
    branches: [main, beta]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm db:generate && git diff --exit-code drizzle/migrations
      - run: pnpm build
      - run: pnpm check:shared-dev-note
      - name: Deploy beta Worker
        if: github.event_name == 'push' && github.ref == 'refs/heads/beta'
        run: pnpm upload:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
