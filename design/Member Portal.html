<style>
  html,body{margin:0;padding:0;background:var(--bg-alt)}
  #root{min-height:100vh}
  .center-load{min-height:100vh;display:grid;place-items:center}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(40px)}to{transform:translateY(0)}}
  @keyframes scanline{0%{top:8%}50%{top:88%}100%{top:8%}}
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
</style>
</head>
